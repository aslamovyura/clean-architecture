services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abc123
      POSTGRES_DB: allocation
      POSTGRES_HOST: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  api:
    build: .
    ports:
      - "9999:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres
    environment:
      - POSTGRES_HOST=postgres